services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      BEDROCK_KB_ID: ${BEDROCK_KB_ID}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      MAX_CRAWL_DEPTH: ${MAX_CRAWL_DEPTH:-2}
      MAX_PAGES_PER_CRAWL: ${MAX_PAGES_PER_CRAWL:-50}
      CRAWL_CONCURRENCY: ${CRAWL_CONCURRENCY:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      SESSION_CLEANUP_INTERVAL_HOURS: ${SESSION_CLEANUP_INTERVAL_HOURS:-6}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile.gradio
    ports:
      - "7860:7860"
    environment:
      API_BASE_URL: http://api:8000/api/v1
      BEDROCK_KB_ID: ${BEDROCK_KB_ID}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
